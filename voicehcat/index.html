<!DOCTYPE html>
<html>
<head>
    <title>Voice Chat Rooms</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0 auto;
            padding: 20px;
            overflow: hidden;
            max-height: 100vh;
        }
        .container {
            display: block;
            gap: 20px;
        }
        .join-form, .room {
            flex: 1;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .participants {
            margin-top: 20px;
        }
        .participant {
            padding: 10px;
            margin: 5px 0;
            background: #f5f5f5;
            border-radius: 4px;
        }
        button {
            padding: 8px 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        input {
            padding: 8px;
            margin: 5px 0;
            width: 100%;
            box-sizing: border-box;
        }
        .participants {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }
        .participant {
            display: block;
            flex-direction: column;
            align-items: center;
            width: 120px;
            text-align: center;
        }
        .participant-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #4CAF50;
            display: block;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .participant-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .participant-volume {
            width: 100px;
        }
        .participant.speaking .participant-circle {
            box-shadow: 0 0 0 3px #4CAF50;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(76, 175, 80, 0); }
            100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
        }
        .current-user .participant-circle {
            background: #2196F3;
        }
        .user-tag {
            font-size: 0.8em;
            color: #666;
            margin-left: 5px;
        }
        .current-user .participant-name {
            color: #2196F3;
        }
        .device-info {
            font-size: 0.8em;
            color: #666;
            margin-top: 2px;
        }
        .debug-console {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        
        .debug-controls {
            margin-bottom: 15px;
        }
        
        .debug-info {
            margin-bottom: 15px;
            padding: 10px;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 4px;
        }
        
        .debug-users {
            margin-bottom: 15px;
        }
        
        #debug-users-list {
            list-style: none;
            padding: 0;
        }
        
        #debug-users-list li {
            padding: 5px;
            margin: 2px 0;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 4px;
        }
        
        .debug-logs {
            max-height: 200px;
            overflow-y: auto;
        }
        
        #debug-log-container {
            font-family: monospace;
            font-size: 12px;
            padding: 10px;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 4px;
        }
        
        .debug-log-entry {
            margin: 2px 0;
            padding: 2px 5px;
            border-left: 3px solid #007bff;
        }
        
        .debug-log-entry.error {
            border-left-color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="join-form">
            <h2>Join Room</h2>
            <input type="text" id="username" placeholder="Your username">
            <input type="text" id="roomId" placeholder="Room ID">
            <button onclick="joinRoom()">Join Room</button>
            <button onclick="createRoom()">Create New Room</button>
        </div>
        <div class="room" style="display: none;">
            <h2>Room: <span id="currentRoom"></span></h2>
            <button onclick="toggleMic()">Toggle Mic</button>
            <button onclick="checkAudioState()">Debug Audio</button>
            <button onclick="checkAudioLevels()">Check Audio Levels</button>
            <button onclick="reconnectAudio()">Reconnect Audio</button>
            <button onclick="debugAudio()">Debug Audio Elements</button>
            <button onclick="checkAudioRouting()">Check Audio Routing</button>
            <div class="participants" id="participants"></div>
            <div class="volume-control">
                <label>Volume: </label>
                <input type="range" min="0" max="100" value="75" onchange="adjustVolume(this.value)">
            </div>
        </div>
    </div>

    <div class="debug-console" style="display: none;">
        <h3>Debug Console</h3>
        <div class="debug-controls">
            <button onclick="toggleDebugConsole()">Toggle Debug Console</button>
            <button onclick="clearDebugLogs()">Clear Logs</button>
        </div>
        <div class="debug-info">
            <div>
                <strong>Room ID:</strong> <span id="debug-room-id">-</span>
            </div>
            <div>
                <strong>Current User:</strong> <span id="debug-current-user">-</span>
            </div>
            <div>
                <strong>Connection Status:</strong> <span id="debug-connection-status">-</span>
            </div>
        </div>
        <div class="debug-users">
            <h4>Connected Users</h4>
            <ul id="debug-users-list"></ul>
        </div>
        <div class="debug-logs">
            <h4>Event Logs</h4>
            <div id="debug-log-container"></div>
        </div>
    </div>

    <script>
        let ws;
        let localStream;
        let peerConnections = {};
        let deviceInfo;
        const configuration = { 
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' },
                { urls: 'stun:stun4.l.google.com:19302' }
            ],
            iceCandidatePoolSize: 10
        };

        let lastGetUsersRequest = 0;
        let connectedPeers = new Set();

        // First, save the original handleMessage function
        const originalHandleMessage = async function(event) {
            const message = JSON.parse(event.data);
            console.log('Received message:', message.type);
            
            switch (message.type) {
                case 'welcome':
                    console.log('Connected to room:', message.content.roomId);
                    const roomSpan = document.getElementById('currentRoom');
                    roomSpan.dataset.userId = message.content.userId;
                    
                    // Clear any existing participants
                    document.getElementById('participants').innerHTML = '';
                    
                    // Add current user to UI
                    const currentUsername = document.getElementById('username').value;
                    addParticipant(currentUsername, message.content.userId, true, deviceInfo?.deviceName || 'Unknown Device');
                    
                    // Request existing users in the room
                    requestExistingUsers();
                    break;

                case 'user-joined':
                    console.log('User joined:', message.from);
                    // Check if user already exists
                    if (!document.getElementById(`participant-${message.content.userId}`)) {
                        addParticipant(message.from, message.content.userId, false, message.content.device);
                        // Create and send offer to new user
                        const pc = createPeerConnection(message.content.userId);
                        
                        // Only create offer if we have a local stream
                        if (localStream) {
                            console.log('Creating offer for new user:', message.content.userId);
                            try {
                                const offer = await pc.createOffer({
                                    offerToReceiveAudio: true,
                                    voiceActivityDetection: true
                                });
                                await pc.setLocalDescription(offer);
                                sendMessage({
                                    type: 'offer',
                                    to: message.content.userId,
                                    content: offer
                                });
                            } catch (err) {
                                console.error('Error creating offer:', err);
                            }
                        }
                    }
                    break;

                case 'user-left':
                    console.log('User left:', message.from);
                    removeParticipant(message.from, message.content.userId);
                    if (peerConnections[message.content.userId]) {
                        peerConnections[message.content.userId].close();
                        delete peerConnections[message.content.userId];
                        connectedPeers.delete(message.content.userId);
                    }
                    break;

                case 'offer':
                    console.log('Received offer from:', message.from);
                    try {
                        let pc = peerConnections[message.from];
                        if (!pc) {
                            pc = createPeerConnection(message.from);
                        }
                        
                        if (pc.signalingState !== "stable") {
                            console.log('Signaling state not stable, ignoring offer');
                            return;
                        }
                        
                        await pc.setRemoteDescription(new RTCSessionDescription(message.content));
                        const answer = await pc.createAnswer();
                        await pc.setLocalDescription(answer);
                        
                        sendMessage({
                            type: 'answer',
                            to: message.from,
                            content: answer
                        });
                    } catch (err) {
                        console.error('Error handling offer:', err);
                    }
                    break;

                case 'answer':
                    console.log('Received answer from:', message.from);
                    try {
                        const pc = peerConnections[message.from];
                        if (pc) {
                            if (pc.signalingState === "have-local-offer") {
                                await pc.setRemoteDescription(new RTCSessionDescription(message.content));
                            } else {
                                console.log('Ignoring answer in state:', pc.signalingState);
                            }
                        }
                    } catch (err) {
                        console.error('Error handling answer:', err);
                    }
                    break;

                case 'ice-candidate':
                    console.log('Received ICE candidate from:', message.from);
                    if (peerConnections[message.from]) {
                        try {
                            await peerConnections[message.from].addIceCandidate(
                                new RTCIceCandidate(message.content)
                            );
                        } catch (e) {
                            console.error('Error adding ICE candidate:', e);
                        }
                    }
                    break;

                case 'existing-users':
                    console.log('Received existing users:', message.content);
                    if (Array.isArray(message.content)) {
                        const currentUserId = document.getElementById('currentRoom').dataset.userId;
                        
                        message.content.forEach(user => {
                            console.log('Processing existing user:', user);
                            // Skip if this user is already displayed or connected
                            if (!document.getElementById(`participant-${user.userId}`) && !connectedPeers.has(user.userId)) {
                                const isCurrentUser = user.userId === currentUserId;
                                addParticipant(user.username, user.userId, isCurrentUser, user.device);
                                
                                // Only create peer connections for other users
                                if (!isCurrentUser && localStream) {
                                    connectedPeers.add(user.userId); // Mark this peer as connected
                                    const pc = createPeerConnection(user.userId);
                                    
                                    // Check if we already have a sender for this track
                                    const audioTrack = localStream.getAudioTracks()[0];
                                    if (audioTrack) {
                                        const senders = pc.getSenders();
                                        const hasSender = senders.some(sender => 
                                            sender.track && sender.track.kind === 'audio'
                                        );
                                        
                                        if (!hasSender) {
                                            console.log('Adding audio track to peer connection for existing user:', user.username);
                                            pc.addTrack(audioTrack, localStream);
                                        }

                                        pc.createOffer({
                                            offerToReceiveAudio: true,
                                            voiceActivityDetection: true
                                        }).then(offer => {
                                            pc.setLocalDescription(offer).then(() => {
                                                sendMessage({
                                                    type: 'offer',
                                                    to: user.userId,
                                                    content: offer
                                                });
                                            });
                                        }).catch(err => {
                                            console.error('Error creating offer for existing user:', err);
                                        });
                                    }
                                }
                            }
                        });
                    }
                    break;
            }
        };

        // Then define the new handleMessage function that includes debug logging
        async function handleMessage(event) {
            const message = JSON.parse(event.data);
            addDebugLog(`Received ${message.type} message${message.from ? ' from ' + message.from : ''}`);
            
            await originalHandleMessage(event);
            
            // Update debug users list after handling the message
            updateDebugUsers();
            
            // Update connection status
            document.getElementById('debug-connection-status').textContent = 
                ws.readyState === WebSocket.OPEN ? 'Connected' : 'Disconnected';
        }

        async function createRoom() {
            const roomId = Math.random().toString(36).substring(7);
            const response = await fetch('/api/room', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ roomId })
            });

            if (response.ok) {
                document.getElementById('roomId').value = roomId;
            }
        }

        async function createVoiceProcessor(stream) {
            const audioContext = new AudioContext({
                sampleRate: 48000,
                latencyHint: 'interactive'
            });
            
            const source = audioContext.createMediaStreamSource(stream);
            
            // Simple compressor for voice leveling
            const compressor = audioContext.createDynamicsCompressor();
            compressor.threshold.value = -24;
            compressor.knee.value = 30;
            compressor.ratio.value = 12;
            compressor.attack.value = 0.003;
            compressor.release.value = 0.25;

            // High-pass filter to reduce low frequency noise
            const highpass = audioContext.createBiquadFilter();
            highpass.type = 'highpass';
            highpass.frequency.value = 85;
            highpass.Q.value = 0.7;

            // Connect the audio chain
            source.connect(highpass);
            highpass.connect(compressor);

            const destination = audioContext.createMediaStreamDestination();
            compressor.connect(destination);

            return destination.stream;
        }

        function getDeviceInfo() {
            const platform = navigator.platform || 'Unknown Platform';
            const userAgent = navigator.userAgent;
            let deviceName = 'Unknown Device';

            // Try to get a meaningful device name
            if (userAgent.includes('Windows')) {
                deviceName = 'Windows PC';
                if (userAgent.includes('Win64')) {
                    deviceName += ' (64-bit)';
                }
            } else if (userAgent.includes('Mac')) {
                deviceName = 'Mac';
                if (userAgent.includes('iPhone')) {
                    deviceName = 'iPhone';
                } else if (userAgent.includes('iPad')) {
                    deviceName = 'iPad';
                }
            } else if (userAgent.includes('Linux')) {
                deviceName = 'Linux PC';
            } else if (userAgent.includes('Android')) {
                deviceName = 'Android Device';
            }

            return {
                deviceName,
                platform,
                browser: navigator.userAgent.match(/(firefox|chrome|safari|edge|opera(?=\/))\/?\s*(\d+)/i)[1] || 'Unknown Browser'
            };
        }

        async function joinRoom() {
            const username = document.getElementById('username').value;
            const roomId = document.getElementById('roomId').value;
            deviceInfo = getDeviceInfo();
            
            if (!username || !roomId) {
                alert('Please enter username and room ID');
                return;
            }

            try {
                const rawStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: false,
                        channelCount: 1,
                        sampleRate: 48000,
                        latency: 0,
                        echoCancellationType: 'system'
                    }
                });

                localStream = rawStream;
                console.log('Got local stream:', localStream.getTracks());

                // Add voice activity detection
                const cleanup = setupVoiceActivityDetection(localStream);
                addVoiceActivityIndicator();

                // Cleanup on room leave
                window.addEventListener('beforeunload', cleanup);
                
                // Setup WebSocket with reconnection
                setupWebSocket(username, roomId, deviceInfo);

                document.querySelector('.join-form').style.display = 'none';
                document.querySelector('.room').style.display = 'block';
                const roomSpan = document.getElementById('currentRoom');
                roomSpan.textContent = roomId;
                
                const userId = document.getElementById('currentRoom').dataset.userId;
                updateDebugInfo(roomId, username, userId);
                addDebugLog(`Joined room ${roomId} as ${username}`);
                document.querySelector('.debug-console').style.display = 'felx';
            } catch (err) {
                console.error('Error joining room:', err);
                alert('Error accessing microphone: ' + err.message);
            }
        }

        // Use injected parameters if available
        const roomId = window.ROOM_ID || new URLSearchParams(window.location.search).get('roomId');
        const username = window.USERNAME || new URLSearchParams(window.location.search).get('username');
        
        function setupWebSocket(username, roomId, deviceInfo) {
            if (ws) {
                console.log('Closing existing WebSocket connection');
                ws.close(1000, 'Normal closure');
                ws = null;
                Object.values(peerConnections).forEach(pc => pc.close());
                peerConnections = {};
                connectedPeers.clear();
            }

            console.log('Setting up new WebSocket connection');
            const wsUrl = `${window.location.protocol === 'https:' ? 'wss:' : 'ws:'}//${window.location.host}/api/ws/voicechat?roomId=${roomId}&username=${username}&device=${deviceInfo.deviceName}`;
            console.log('Connecting to:', wsUrl);
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                console.log('WebSocket connection established');
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };

            ws.onclose = (event) => {
                console.log('WebSocket closed:', event.code, event.reason);
                if (event.code !== 1000) {
                    setTimeout(() => {
                        if (!ws || ws.readyState === WebSocket.CLOSED) {
                            console.log('Attempting to reconnect...');
                            setupWebSocket(username, roomId, deviceInfo);
                        }
                    }, 3000);
                }
            };

            ws.onmessage = handleMessage;

            // Keep-alive with error handling
            const keepAlive = setInterval(() => {
                if (ws?.readyState === WebSocket.OPEN) {
                    try {
                        sendMessage({ type: 'keep-alive' });
                    } catch (err) {
                        console.error('Error sending keep-alive:', err);
                        clearInterval(keepAlive);
                    }
                } else if (ws?.readyState === WebSocket.CLOSED) {
                    clearInterval(keepAlive);
                }
            }, 15000);

            return () => {
                clearInterval(keepAlive);
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.close(1000);
                }
            };
        }

        function createPeerConnection(peerId) {
            console.log('Creating peer connection for:', peerId);
            if (peerConnections[peerId]) {
                console.log('Closing existing connection for:', peerId);
                peerConnections[peerId].close();
            }
            
            const pc = new RTCPeerConnection(configuration);
            
            pc.onicecandidate = event => {
                if (event.candidate) {
                    console.log('Sending ICE candidate to:', peerId);
                    sendMessage({
                        type: 'ice-candidate',
                        to: peerId,
                        content: event.candidate
                    });
                }
            };

            // Add local stream if available
            if (localStream) {
                const audioTrack = localStream.getAudioTracks()[0];
                if (audioTrack) {
                    try {
                        pc.addTrack(audioTrack, localStream);
                        console.log('Added local audio track to peer connection:', {
                            id: audioTrack.id,
                            enabled: audioTrack.enabled,
                            muted: audioTrack.muted,
                            readyState: audioTrack.readyState
                        });
                    } catch (e) {
                        console.warn('Could not add audio track:', e);
                    }
                }
            }

            pc.oniceconnectionstatechange = () => {
                console.log(`ICE connection state for ${peerId}:`, pc.iceConnectionState);
                if (pc.iceConnectionState === 'failed') {
                    console.log('Attempting to restart ICE');
                    pc.restartIce();
                }
            };

            pc.onconnectionstatechange = () => {
                const state = pc.connectionState;
                console.log(`Connection state for ${peerId}:`, state);
                if (state === 'connected') {
                    console.log('Peer connection established successfully');
                }
            };

            pc.onsignalingstatechange = () => {
                console.log(`Signaling state for ${peerId}:`, pc.signalingState);
            };

            pc.ontrack = event => {
                const remoteUserId = peerId;
                const localUserId = document.getElementById('currentRoom').dataset.userId;
                
                if (remoteUserId === localUserId) {
                    console.log('Ignoring own audio stream');
                    return;
                }

                console.log('Received remote track from:', peerId);
                const audioElement = document.createElement('audio');
                audioElement.id = `audio-${peerId}`;
                audioElement.srcObject = event.streams[0];
                audioElement.autoplay = true;
                audioElement.controls = true;
                audioElement.volume = 1.0;
                document.body.appendChild(audioElement);

                const playAudio = async () => {
                    try {
                        await audioElement.play();
                        console.log('Successfully playing audio from:', peerId);
                    } catch (e) {
                        console.error('Error playing audio:', e);
                        const playButton = document.createElement('button');
                        playButton.textContent = `Play Audio (${peerId})`;
                        playButton.onclick = () => audioElement.play();
                        document.body.appendChild(playButton);
                    }
                };
                playAudio();

                event.track.onmute = () => console.log('Track muted:', peerId);
                event.track.onunmute = () => console.log('Track unmuted:', peerId);
                event.track.onended = () => console.log('Track ended:', peerId);

                // Add audio level monitoring
                const audioContext = new AudioContext();
                const source = audioContext.createMediaStreamSource(event.streams[0]);
                const analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);

                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                function checkAudioLevel() {
                    analyser.getByteFrequencyData(dataArray);
                    const average = dataArray.reduce((a, b) => a + b) / dataArray.length;
                    updateSpeakingIndicator(peerId, average > 30);
                    requestAnimationFrame(checkAudioLevel);
                }
                checkAudioLevel();
            };
            
            peerConnections[peerId] = pc;
            return pc;
        }

        function sendMessage(message) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                console.log('Sending message:', message.type);
                ws.send(JSON.stringify(message));
            }
        }

        function addParticipant(username, userId, isCurrentUser = false, deviceInfo = '') {
            const div = document.createElement('div');
            div.className = 'participant';
            if (isCurrentUser) {
                div.classList.add('current-user');
            }
            div.id = `participant-${userId}`;
            
            const initials = username
                .split(' ')
                .map(word => word[0])
                .join('')
                .toUpperCase()
                .slice(0, 2);

            div.innerHTML = `
                <div class="participant-circle">${initials}</div>
                <div class="participant-name">
                    ${username}
                    ${isCurrentUser ? '<span class="user-tag">(You)</span>' : ''}
                    <div class="device-info">${deviceInfo}</div>
                </div>
                ${!isCurrentUser ? `
                    <input type="range" 
                           class="participant-volume" 
                           min="0" 
                           max="100" 
                           value="100"
                           oninput="adjustParticipantVolume('${userId}', this.value)">
                    <div class="volume-value">100%</div>
                ` : ''}
            `;
            
            document.getElementById('participants').appendChild(div);
        }

        function removeParticipant(username, userId) {
            const element = document.getElementById(`participant-${userId}`);
            if (element) {
                element.remove();
            }
        }

        let isMuted = false;
        let isAutoMuted = false;
        function toggleMic(mute = null) {
            if (localStream) {
                const audioTrack = localStream.getAudioTracks()[0];
                isMuted = mute !== null ? mute : !isMuted;
                
                audioTrack.enabled = !isMuted;
                
                Object.values(peerConnections).forEach(pc => {
                    const sender = pc.getSenders().find(s => s.track && s.track.kind === 'audio');
                    if (sender && sender.track) {
                        sender.track.enabled = !isMuted;
                    }
                });
                
                const micButton = document.querySelector('button[onclick="toggleMic()"]');
                micButton.textContent = isMuted ? 'Unmute Mic' : 'Mute Mic';
                
                console.log('Mic manually toggled:', isMuted ? 'muted' : 'unmuted', {
                    trackEnabled: audioTrack.enabled,
                    trackMuted: audioTrack.muted
                });
            }
        }

        function autoToggleMic(mute) {
            if (localStream && !isMuted) {
                isAutoMuted = mute;
                const audioTrack = localStream.getAudioTracks()[0];
                
                audioTrack.enabled = !mute;
                
                Object.values(peerConnections).forEach(pc => {
                    const sender = pc.getSenders().find(s => s.track && s.track.kind === 'audio');
                    if (sender && sender.track) {
                        sender.track.enabled = !mute;
                    }
                });
                
                console.log('Mic auto-toggled:', mute ? 'muted' : 'unmuted');
            }
        }

        function checkAudioState() {
            console.log('Local stream tracks:', localStream?.getTracks().map(t => ({
                kind: t.kind,
                enabled: t.enabled,
                muted: t.muted,
                readyState: t.readyState
            })));
            
            console.log('Peer Connections:', Object.keys(peerConnections).map(key => ({
                peer: key,
                iceState: peerConnections[key].iceConnectionState,
                signalingState: peerConnections[key].signalingState,
                connectionState: peerConnections[key].connectionState
            })));
            
            const audioElements = document.getElementsByTagName('audio');
            for(let audio of audioElements) {
                console.log('Audio element:', audio.id, {
                    readyState: audio.readyState,
                    paused: audio.paused,
                    currentTime: audio.currentTime,
                    srcObject: audio.srcObject,
                    muted: audio.muted
                });
            }
        }

        function checkAudioLevels() {
            if (localStream) {
                const audioContext = new AudioContext();
                const source = audioContext.createMediaStreamSource(localStream);
                const analyser = audioContext.createAnalyser();
                source.connect(analyser);
                
                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                function checkLevel() {
                    analyser.getByteFrequencyData(dataArray);
                    const average = dataArray.reduce((a, b) => a + b) / dataArray.length;
                    console.log('Local audio level:', average);
                    requestAnimationFrame(checkLevel);
                }
                
                checkLevel();
            }
        }

        function debugAudio() {
            const audioElements = document.getElementsByTagName('audio');
            console.log('Number of audio elements:', audioElements.length);
            
            for (let audio of audioElements) {

                    id: audio.id,

        function addVoiceControls() {

            controlsDiv.className = 'voice-controls';

            const style = document.createElement('style');

        function adjustVolume(value) {
            const audioElements = document.getElementsByTagName('audio');
            const volume = value / 100;
            for (let audio of audioElements) {
                if (!audio.id.includes('local')) {
                    audio.volume = volume;
                }
            }
        }

        function setupVoiceActivityDetection(stream) {
            const analyzerStream = stream.clone();
            
            const audioContext = new AudioContext();
            const source = audioContext.createMediaStreamSource(analyzerStream);
            const analyser = audioContext.createAnalyser();
            const processor = audioContext.createScriptProcessor(2048, 1, 1);
            
            analyser.smoothingTimeConstant = 0.2;
            analyser.fftSize = 1024;

            source.connect(analyser);
            analyser.connect(processor);
            processor.connect(audioContext.destination);

            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            let silenceStart = Date.now();
            const SILENCE_THRESHOLD = 15;
            const SILENCE_DURATION = 2000;
            let consecutiveVoiceFrames = 0;
            let consecutiveSilenceFrames = 0;
            const REQUIRED_VOICE_FRAMES = 5;
            const REQUIRED_SILENCE_FRAMES = 50;

            const debugDiv = document.createElement('div');
            debugDiv.id = 'vad-debug';
            debugDiv.style.cssText = 'position: fixed; bottom: 10px; right: 10px; background: rgba(0,0,0,0.8); color: white; padding: 10px; border-radius: 5px;';
            document.body.appendChild(debugDiv);

            processor.onaudioprocess = () => {
                // Check if stream exists and is not muted
                if (!analyzerStream || isMuted) return;

                analyser.getByteFrequencyData(dataArray);
                
                const voiceFreqStart = Math.floor(300 * analyser.fftSize / audioContext.sampleRate);
                const voiceFreqEnd = Math.floor(3000 * analyser.fftSize / audioContext.sampleRate);
                let sum = 0;
                let count = 0;
                
                for (let i = voiceFreqStart; i < voiceFreqEnd; i++) {
                    sum += dataArray[i];
                    count++;
                }
                const average = sum / count;

                const currentThreshold = window.vadThreshold || SILENCE_THRESHOLD;

                debugDiv.textContent = `
                    Level: ${Math.round(average)} 
                    Threshold: ${currentThreshold}
                    Manual Mute: ${isMuted}
                    Auto Mute: ${isAutoMuted}
                    Voice Frames: ${consecutiveVoiceFrames}
                    Silence Frames: ${consecutiveSilenceFrames}
                    Local Track: ${localStream.getAudioTracks()[0].enabled}
                `;

                if (average > currentThreshold) {
                    consecutiveVoiceFrames++;
                    consecutiveSilenceFrames = 0;
                    silenceStart = Date.now();
                    
                    if (isAutoMuted && !isMuted) {
                        console.log('Voice detected, auto-unmuting', average);
                        autoToggleMic(false);
                    }
                } else {
                    consecutiveSilenceFrames++;
                    
                    if (consecutiveSilenceFrames > 10) {
                        consecutiveVoiceFrames = 0;
                    }
                    
                    if (!isAutoMuted && !isMuted && 
                        consecutiveSilenceFrames >= REQUIRED_SILENCE_FRAMES && 
                        Date.now() - silenceStart > SILENCE_DURATION) {
                        console.log('Silence detected, auto-muting', average);
                        autoToggleMic(true);
                    }
                }

                updateVoiceIndicator(average > currentThreshold);
            };

            const thresholdControl = document.createElement('div');
            thresholdControl.innerHTML = `
                <div style="margin-top: 10px;">
                    <label>Voice Detection Sensitivity: </label>
                    <input type="range" min="5" max="50" value="${SILENCE_THRESHOLD}" 
                           oninput="window.vadThreshold = parseInt(this.value)"
                           style="width: 200px;">
                    <span id="threshold-value">${SILENCE_THRESHOLD}</span>
                </div>
            `;
            document.querySelector('.room').appendChild(thresholdControl);
            
            const thresholdSlider = thresholdControl.querySelector('input');
            const thresholdValue = thresholdControl.querySelector('#threshold-value');
            thresholdSlider.addEventListener('input', (e) => {
                const value = e.target.value;
                window.vadThreshold = parseInt(value);
                thresholdValue.textContent = value;
            });

            window.vadThreshold = SILENCE_THRESHOLD;

            return () => {
                processor.disconnect();
                analyser.disconnect();
                source.disconnect();
                analyzerStream.getTracks().forEach(track => track.stop());
                debugDiv.remove();
            };
        }

        function addVoiceActivityIndicator() {
            const indicator = document.createElement('div');
            indicator.id = 'voice-indicator';
            indicator.className = 'voice-indicator';
            indicator.innerHTML = `
                <div class="indicator-dot"></div>
                <span>Voice Activity</span>
            `;
            document.querySelector('.room').appendChild(indicator);

            const style = document.createElement('style');
            style.textContent = `
                .voice-indicator {
                    display: block;
                    align-items: center;
                    gap: 10px;
                    margin-top: 10px;
                }
                .indicator-dot {
                    width: 12px;
                    height: 12px;
                    border-radius: 50%;
                    background-color: #ccc;
                    transition: background-color 0.2s;
                }
                .indicator-dot.active {
                    background-color: #4CAF50;
                }
            `;
            document.head.appendChild(style);
        }

        function updateVoiceIndicator(isActive) {
            const dot = document.querySelector('.indicator-dot');
            if (dot) {
                dot.className = `indicator-dot${isActive ? ' active' : ''}`;
            }
        }

        function checkAudioRouting() {
            console.log('Local Stream:', {
                tracks: localStream?.getTracks().map(t => ({
                    kind: t.kind,
                    enabled: t.enabled,
                    muted: t.muted,
                    id: t.id
                }))
            });

            Object.entries(peerConnections).forEach(([peerId, pc]) => {
                console.log(`Peer Connection ${peerId}:`, {
                    senders: pc.getSenders().map(s => ({
                        track: s.track ? {
                            kind: s.track.kind,
                            enabled: s.track.enabled,
                            muted: s.track.muted,
                            id: s.track.id
                        } : null
                    })),
                    receivers: pc.getReceivers().map(r => ({
                        track: r.track ? {
                            kind: r.track.kind,
                            enabled: r.track.enabled,
                            muted: r.track.muted,
                            id: r.track.id
                        } : null
                    }))
                });
            });

            const audioElements = document.getElementsByTagName('audio');
            console.log('Audio Elements:', Array.from(audioElements).map(audio => ({
                id: audio.id,
                srcObject: audio.srcObject ? {
                    active: audio.srcObject.active,
                    tracks: audio.srcObject.getTracks().map(t => ({
                        kind: t.kind,
                        enabled: t.enabled,
                        muted: t.muted,
                        id: t.id
                    }))
                } : null,
                volume: audio.volume,
                muted: audio.muted,
                paused: audio.paused
            })));
        }

        function adjustParticipantVolume(userId, value) {
            const audioElement = document.getElementById(`audio-${userId}`);
            if (audioElement) {
                const volume = value / 100;
                audioElement.volume = volume;
                
                // Update volume display
                const participant = document.getElementById(`participant-${userId}`);
                const volumeValue = participant.querySelector('.volume-value');
                volumeValue.textContent = `${Math.round(value)}%`;
            }
        }

        function updateSpeakingIndicator(userId, isSpeaking) {
            const participant = document.getElementById(`participant-${userId}`);
            if (participant) {
                if (isSpeaking) {
                    participant.classList.add('speaking');
                } else {
                    participant.classList.remove('speaking');
                }
            }
        }

        // Debug Console Functions
        function toggleDebugConsole() {
            const debugConsole = document.querySelector('.debug-console');
            debugConsole.style.display = debugConsole.style.display === 'none' ? 'block' : 'none';
        }
        
        function clearDebugLogs() {
            document.getElementById('debug-log-container').innerHTML = '';
        }
        
        function updateDebugInfo(roomId, username, userId) {
            document.getElementById('debug-room-id').textContent = roomId;
            document.getElementById('debug-current-user').textContent = `${username} (${userId})`;
        }
        
        function updateDebugUsers() {
            const usersList = document.getElementById('debug-users-list');
            usersList.innerHTML = '';
            
            document.querySelectorAll('.participant').forEach(participant => {
                const li = document.createElement('li');
                const username = participant.querySelector('.participant-name').textContent;
                const userId = participant.id.replace('participant-', '');
                li.textContent = `${username} (${userId})`;
                usersList.appendChild(li);
            });
        }
        
        function addDebugLog(message, isError = false) {
            const container = document.getElementById('debug-log-container');
            const entry = document.createElement('div');
            entry.className = `debug-log-entry${isError ? ' error' : ''}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }
        
        // Add error logging to existing error handlers
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            addDebugLog(`Error: ${msg}`, true);
            return false;
        }

        function requestExistingUsers() {
            const now = Date.now();
            if (now - lastGetUsersRequest < 10000) { // Increase to 10 seconds
                console.log('Skipping get-users request, too soon');
                return;
            }
            lastGetUsersRequest = now;
            sendMessage({
                type: 'get-users'
            });
        }

        // Add connection state tracking
        let isReconnecting = false;

        window.addEventListener('online', () => {
            if (!isReconnecting && document.querySelector('.room').style.display !== 'none') {
                isReconnecting = true;
                console.log('Network is back online, reconnecting...');
                setupWebSocket(
                    document.getElementById('username').value,
                    document.getElementById('currentRoom').textContent,
                    deviceInfo
                );
                isReconnecting = false;
            }
        });

        window.addEventListener('beforeunload', () => {
            if (ws) {
                ws.close();
            }
            Object.values(peerConnections).forEach(pc => pc.close());
            peerConnections = {};
            connectedPeers.clear();
        });

        document.addEventListener('DOMContentLoaded', function() {
            if (roomId && username) {
                document.getElementById('username').value = username;
                document.getElementById('currentRoom').textContent = roomId;
                joinRoom();
            }
        });

        function cleanupRoom() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.close(1000, 'User left room');
            }
            
            // Cleanup WebRTC connections
            Object.values(peerConnections).forEach(pc => pc.close());
            peerConnections = {};
            connectedPeers.clear();
            
            // Reset UI
            document.querySelector('.join-form').style.display = 'block';
            document.querySelector('.room').style.display = 'none';
            document.getElementById('participants').innerHTML = '';
            
            // Stop local stream if it exists
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            
            // Cleanup audio processor
            if (typeof processor !== 'undefined' && processor) {
                processor.disconnect();
                processor = null;
            }
            if (typeof analyser !== 'undefined' && analyser) {
                analyser.disconnect();
                analyser = null;
            }
            if (typeof analyzerStream !== 'undefined' && analyzerStream) {
                analyzerStream.getTracks().forEach(track => track.stop());
                analyzerStream = null;
            }
        }

        // Add window event listeners
        window.addEventListener('beforeunload', cleanupRoom);
        window.addEventListener('unload', cleanupRoom);

        // Add a leave room button to the room div
        document.querySelector('.room').innerHTML += `
            <button onclick="leaveRoom()" style="margin-top: 10px; background: #dc3545;">Leave Room</button>
        `;

        function leaveRoom() {
            cleanupRoom();
            // Clear input fields
            document.getElementById('username').value = '';
            document.getElementById('roomId').value = '';
        }

        // Modify the existing window.onbeforeunload handler
        window.onbeforeunload = function() {
            cleanupRoom();
        };
    </script>
